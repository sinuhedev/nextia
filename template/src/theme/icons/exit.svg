<svg id="exit_svg" width="256" height="256" viewBox="0 0 48 48" fill="none" color="currentColor" stroke="currentColor"
   stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"
   xmlns="http://www.w3.org/2000/svg">

   <style>
      #exit_svg:hover {
         transform: rotate(-90deg);

         #ring {
            stroke-dasharray: 200, 1;
            stroke: var(--primary-color);
         }

         #arrow {
            transform: translateY(2px);
            stroke: var(--primary-color);

            line {
               stroke-width: 3px;
            }

            #right,
            #left {
               display: block;
            }
         }
      }

      #exit_svg {
         transition: transform 200ms linear;

         #ring {
            stroke-dasharray: 1, 200;
            stroke-dashoffset: 1;
            transition:
               stroke-dashoffset 400ms linear,
               stroke-dasharray 400ms linear;
         }

         #arrow {
            animation: arrow 2s ease-in-out infinite;

            #right,
            #left {
               display: none;
            }
         }
      }

      @keyframes arrow {

         0%,
         100% {
            transform: translateY(2px);
         }

         50% {
            transform: translateY(6px);
         }
      }
   </style>


   <path id="ring-bg" d="M 12,3.4 C 5.8,7.2 1.8,14 1.8,22 1.8,35 12,45 24,45 36,45 46,35 46,22 46,14 42,7.2 36,3.4" />
   <path id="ring" d="M 12,3.4 C 5.8,7.2 1.8,14 1.8,22 1.8,35 12,45 24,45 36,45 46,35 46,22 46,14 42,7.2 36,3.4" />
   <g id="arrow">
      <line id="left" x1="24" y1="25" x2="10" y2="14" />
      <line id="center" x1="24" y1="1" x2="24" y2="25" />
      <line id="right" x1="24" y1="25" x2="35" y2="14" />
   </g>

</svg>